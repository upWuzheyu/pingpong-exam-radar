name: Update exam feed

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-exam-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate exam feed
        run: node scripts/updateExamFeed.js

      - name: Commit generated feed
        run: |
          if git diff --quiet -- data/exam-feed.generated.json data/feed-debug-report.json; then
            echo "No feed changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exam-feed.generated.json
          git add data/feed-debug-report.json
          git commit -m "Update generated exam feed and debug report"
          git push
